<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <clipPath id="gh">
      <polygon points="0,0 128,0 0,128"/>
    </clipPath>
    <clipPath id="gl">
      <polygon points="128,0 128,128 0,128"/>
    </clipPath>
  </defs>

  <!-- GitHub half (top-left, dark) -->
  <g clip-path="url(#gh)">
    <rect width="128" height="128" fill="#24292e"/>
    <g transform="translate(14,12) scale(2.2)">
      <path fill="white" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </g>
  </g>

  <!-- GitLab half (bottom-right, white background with colored tanuki) -->
  <g clip-path="url(#gl)">
    <rect width="128" height="128" fill="#ffffff"/>
    <g transform="translate(63,65) scale(1.9)">
      <!-- Left ear -->
      <polygon points="5.5,0 1.5,11 9,11" fill="#E24329"/>
      <!-- Right ear -->
      <polygon points="20.5,0 17,11 24.5,11" fill="#E24329"/>
      <!-- Far-left outer -->
      <polygon points="13,24 0.3,16 1.5,11" fill="#FCA326"/>
      <!-- Left cheek -->
      <polygon points="13,24 1.5,11 9,11" fill="#FC6D26"/>
      <!-- Center chin -->
      <polygon points="13,24 9,11 17,11" fill="#E24329"/>
      <!-- Right cheek -->
      <polygon points="13,24 17,11 24.5,11" fill="#FC6D26"/>
      <!-- Far-right outer -->
      <polygon points="13,24 24.5,11 25.7,16" fill="#FCA326"/>
    </g>
  </g>

  <!-- Diagonal separator -->
  <line x1="128" y1="0" x2="0" y2="128" stroke="#cccccc" stroke-width="1.5"/>
</svg>
