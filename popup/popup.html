<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>Contribution Heatmap</title>
</head>
<body>
  <header>
    <h1 data-i18n="popup.title">Contributions</h1>
    <div class="header-actions">
      <select id="lang-select" class="lang-select">
        <option value="en">EN</option>
        <option value="es">ES</option>
        <option value="zh">ZH</option>
      </select>
      <button id="btn-github" class="provider-btn" data-i18n-title="popup.connectGitHub" title="Connect GitHub">
        <span class="provider-dot gh-dot"></span>
        <span class="provider-label">GitHub</span>
      </button>
      <button id="btn-gitlab" class="provider-btn" data-i18n-title="popup.connectGitLab" title="Connect GitLab">
        <span class="provider-dot gl-dot"></span>
        <span class="provider-label">GitLab</span>
      </button>
      <button id="btn-refresh" class="icon-btn" data-i18n-title="popup.refresh" title="Refresh" disabled>&#x21bb;</button>
      <button id="btn-options" class="icon-btn" data-i18n-title="popup.options" title="Options">&#x2699;</button>
    </div>
  </header>

  <div id="status-bar" class="status-bar hidden"></div>

  <div id="heatmap-container" class="heatmap-container">
    <p class="placeholder" data-i18n="popup.placeholder">Connect a provider to see your contributions.</p>
  </div>

  <div id="activity-section" class="activity-section">
    <div class="main-tabs" role="tablist">
      <button type="button" id="tab-user" class="main-tab active" data-tab="user"
              role="tab" aria-selected="true"
              data-i18n="mainTab.user" data-i18n-title="mainTab.userTitle">User Activity</button>
      <button type="button" id="tab-groups" class="main-tab" data-tab="groups"
              role="tab" aria-selected="false"
              data-i18n="mainTab.groups" data-i18n-title="mainTab.groupsTitle">Group Activity</button>
    </div>

    <div id="group-tabs-container" class="group-tabs-container hidden">
      <div id="group-tabs" class="group-tabs" role="tablist"></div>
      <div id="group-tabs-empty" class="group-tabs-empty hidden" data-i18n="groupTab.noGroups">You are not a member of any organization or group.</div>
    </div>

    <div id="activity-feed" class="activity-feed">
      <div class="section-header">
        <h2 data-i18n="popup.recentActivity">Recent Activity</h2>
        <div class="activity-filter-group">
          <button type="button" id="filter-all" class="activity-filter-btn active" data-filter="all" data-i18n="activityFilter.all" data-i18n-title="activityFilter.allTitle" title="Show all activity">All</button>
          <button type="button" id="filter-github" class="activity-filter-btn" data-filter="github" data-i18n-title="activityFilter.githubTitle" title="Show only GitHub">
            <span class="provider-dot gh-dot"></span>GitHub
          </button>
          <button type="button" id="filter-gitlab" class="activity-filter-btn" data-filter="gitlab" data-i18n-title="activityFilter.gitlabTitle" title="Show only GitLab">
            <span class="provider-dot gl-dot"></span>GitLab
          </button>
        </div>
      </div>
      <div id="activity-list" class="activity-list"></div>
    </div>

    <div id="activity-detail" class="activity-detail hidden">
      <div class="detail-header">
        <button id="btn-back" class="back-btn">&larr; <span data-i18n="popup.back">Back</span></button>
        <span id="detail-type" class="detail-type-badge"></span>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
