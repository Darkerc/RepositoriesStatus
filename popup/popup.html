<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    var _t = localStorage.getItem('user_theme');
    if (_t === 'light' || _t === 'dark') document.documentElement.setAttribute('data-theme', _t);
  </script>
  <link rel="stylesheet" href="popup.css">
  <title>Contribution Heatmap</title>
</head>
<body>
  <header>
    <h1 data-i18n="popup.title">Contributions</h1>
    <div class="header-actions">
      <select id="lang-select" class="lang-select">
        <option value="en">EN</option>
        <option value="es">ES</option>
        <option value="zh">ZH</option>
      </select>
      <button id="btn-theme" class="icon-btn" data-i18n-title="theme.system" title="Theme: System">
        <svg id="icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="hidden">
          <path d="M8 12a4 4 0 100-8 4 4 0 000 8zM8 0a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0V.75A.75.75 0 018 0zm0 13a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 018 13zM3.05 2.34a.75.75 0 011.06 0l1.06 1.06a.75.75 0 11-1.06 1.06L3.05 3.4a.75.75 0 010-1.06zm8.84 8.84a.75.75 0 011.06 0l1.06 1.06a.75.75 0 11-1.06 1.06l-1.06-1.06a.75.75 0 010-1.06zM0 8a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5H.75A.75.75 0 010 8zm13 0a.75.75 0 01.75-.75h1.5a.75.75 0 010 1.5h-1.5A.75.75 0 0113 8zM3.05 13.66a.75.75 0 010-1.06l1.06-1.06a.75.75 0 111.06 1.06l-1.06 1.06a.75.75 0 01-1.06 0zm8.84-8.84a.75.75 0 010-1.06l1.06-1.06a.75.75 0 111.06 1.06l-1.06 1.06a.75.75 0 01-1.06 0z"/>
        </svg>
        <svg id="icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="hidden">
          <path d="M9.598 1.591a.75.75 0 01.785-.175 7 7 0 11-8.967 8.967.75.75 0 01.961-.96 5.5 5.5 0 007.046-7.046.75.75 0 01.175-.786z"/>
        </svg>
        <svg id="icon-system" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M1 3.5A1.5 1.5 0 012.5 2h11A1.5 1.5 0 0115 3.5v7a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 10.5v-7zM2.5 3a.5.5 0 00-.5.5v7a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-7a.5.5 0 00-.5-.5h-11zM5 14.5a.75.75 0 010-1.5h6a.75.75 0 010 1.5H5z"/>
        </svg>
      </button>
      <button id="btn-github" class="provider-btn" data-i18n-title="popup.connectGitHub" title="Connect GitHub">
        <span class="provider-dot gh-dot"></span>
        <span class="provider-label">GitHub</span>
      </button>
      <button id="btn-gitlab" class="provider-btn" data-i18n-title="popup.connectGitLab" title="Connect GitLab">
        <span class="provider-dot gl-dot"></span>
        <span class="provider-label">GitLab</span>
      </button>
      <button id="btn-refresh" class="icon-btn" data-i18n-title="popup.refresh" title="Refresh" disabled>&#x21bb;</button>
      <button id="btn-options" class="icon-btn" data-i18n-title="popup.options" title="Options">&#x2699;</button>
    </div>
  </header>

  <div id="status-bar" class="status-bar hidden"></div>

  <div class="heatmap-toolbar" id="heatmap-toolbar">
    <button type="button" id="btn-toggle-heatmap" class="icon-btn" data-i18n-title="heatmap.toggleShow" title="Show/Hide heatmap">
      <svg id="icon-eye-open" width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 2C4.5 2 1.6 4.2.3 7.5a.5.5 0 000 .4C1.6 11.3 4.5 14 8 14s6.4-2.7 7.7-6.1a.5.5 0 000-.4C14.4 4.2 11.5 2 8 2zm0 10.5C5.2 12.5 2.8 10.7 1.8 8 2.8 5.3 5.2 3.5 8 3.5s5.2 1.8 6.2 4.5c-1 2.7-3.4 4.5-6.2 4.5zM8 5a3 3 0 100 6 3 3 0 000-6zm0 4.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
      </svg>
      <svg id="icon-eye-closed" width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="hidden">
        <path d="M14.5 1.1a.5.5 0 01.1.7l-13 12a.5.5 0 01-.7-.7l2-1.8A8.7 8.7 0 01.3 7.9a.5.5 0 010-.4C1.6 4.2 4.5 2 8 2c1.5 0 2.9.4 4.1 1.1l2-1.8a.5.5 0 01.7 0zM11 3.8L9.5 5.2A3 3 0 006.7 8l-1.8 1.7A7 7 0 011.8 8C2.8 5.3 5.2 3.5 8 3.5c1.1 0 2.1.3 3 .8zm-3 7.7c2.8 0 5.2-1.8 6.2-4.5-.5-1.2-1.2-2.3-2.1-3.1l-1.5 1.4A3 3 0 018 11a3 3 0 01-1.5-.4L5 12a7 7 0 003 .5z"/>
      </svg>
    </button>
    <button type="button" id="btn-download-heatmap" class="icon-btn" data-i18n-title="heatmap.download" title="Download heatmap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M7.5 10.4L4.3 7.1a.5.5 0 01.7-.7L7.5 9V1.5a.5.5 0 011 0V9l2.5-2.6a.5.5 0 01.7.7L8.5 10.4a.7.7 0 01-1 0zM2 12.5a.5.5 0 011 0v1h10v-1a.5.5 0 011 0v1.5a.5.5 0 01-.5.5h-11a.5.5 0 01-.5-.5v-1.5z"/>
      </svg>
    </button>
    <button type="button" id="btn-heatmap-colors" class="icon-btn" data-i18n-title="heatmap.customColors" title="Customize heatmap colors">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0a8 8 0 100 16A8 8 0 008 0zM2.6 11.5a6.5 6.5 0 019.5-8.2L3.3 12.1a6.5 6.5 0 01-.7-.6zm1.7 1.2l8.8-8.8a6.5 6.5 0 01-8.8 8.8z"/>
      </svg>
    </button>
  </div>

  <div id="heatmap-color-panel" class="heatmap-color-panel hidden">
    <div class="color-picker-row">
      <label data-i18n="heatmap.githubColor">GitHub</label>
      <input type="color" id="color-github" value="#216e39">
    </div>
    <div class="color-picker-row">
      <label data-i18n="heatmap.gitlabColor">GitLab</label>
      <input type="color" id="color-gitlab" value="#6d28d9">
    </div>
    <div class="color-picker-row">
      <label data-i18n="heatmap.mixedColor">Mixed</label>
      <input type="color" id="color-mixed" value="#0d9488">
    </div>
    <div class="color-picker-actions">
      <button type="button" id="btn-reset-colors" class="color-reset-btn" data-i18n="heatmap.resetColors">Reset</button>
    </div>
  </div>

  <div id="heatmap-container" class="heatmap-container">
    <p class="placeholder" data-i18n="popup.placeholder">Connect a provider to see your contributions.</p>
  </div>

  <div id="activity-section" class="activity-section">
    <div class="main-tabs" role="tablist">
      <button type="button" id="tab-user" class="main-tab active" data-tab="user"
              role="tab" aria-selected="true"
              data-i18n="mainTab.user" data-i18n-title="mainTab.userTitle">User Activity</button>
      <button type="button" id="tab-groups" class="main-tab" data-tab="groups"
              role="tab" aria-selected="false"
              data-i18n="mainTab.groups" data-i18n-title="mainTab.groupsTitle">Group Activity</button>
    </div>

    <div id="group-tabs-container" class="group-tabs-container hidden">
      <div id="group-tabs" class="group-tabs" role="tablist"></div>
      <div id="group-tabs-empty" class="group-tabs-empty hidden" data-i18n="groupTab.noGroups">You are not a member of any organization or group.</div>
    </div>

    <div id="activity-feed" class="activity-feed">
      <div class="section-header">
        <h2 data-i18n="popup.recentActivity">Recent Activity</h2>
        <div class="activity-filter-group">
          <button type="button" id="filter-all" class="activity-filter-btn active" data-filter="all" data-i18n="activityFilter.all" data-i18n-title="activityFilter.allTitle" title="Show all activity">All</button>
          <button type="button" id="filter-github" class="activity-filter-btn" data-filter="github" data-i18n-title="activityFilter.githubTitle" title="Show only GitHub">
            <span class="provider-dot gh-dot"></span>GitHub
          </button>
          <button type="button" id="filter-gitlab" class="activity-filter-btn" data-filter="gitlab" data-i18n-title="activityFilter.gitlabTitle" title="Show only GitLab">
            <span class="provider-dot gl-dot"></span>GitLab
          </button>
        </div>
      </div>
      <div id="activity-list" class="activity-list"></div>
    </div>

    <div id="activity-detail" class="activity-detail hidden">
      <div class="detail-header">
        <button id="btn-back" class="back-btn">&larr; <span data-i18n="popup.back">Back</span></button>
        <span id="detail-type" class="detail-type-badge"></span>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
